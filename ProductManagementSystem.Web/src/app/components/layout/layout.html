<div class="app-container">
  <!-- 1. Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">📦</span>
      <span class="brand-name">PMS System</span>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/products" routerLinkActive="active" class="nav-item">
        <span class="item-icon">🛍️</span>
        <span class="item-text">Products</span>
      </a>
      <a routerLink="/categories" routerLinkActive="active" class="nav-item">
        <span class="item-icon">📁</span>
        <span class="item-text">Categories</span>
      </a>
    </nav>
  </aside>

  <!-- 2. Main Content Area -->
  <div class="main-content">
    <!-- Header Topbar -->
    <header class="main-header">
      <div class="header-left">
        <!-- Breadcrumb or page title can go here -->
      </div>
      <div class="header-right">
        <div class="user-profile">
          <span class="user-avatar">👤</span>
          <div class="user-info">
            <span class="user-name">{{ userFullName }}</span>
            <span class="user-role">{{ username }}</span>
          </div>
        </div>
        <button (click)="openLogoutConfirm()" class="btn-logout" title="Sign Out">
          <span class="logout-icon">🚪</span>
          <span>Sign Out</span>
        </button>
      </div>
    </header>

    <!-- Nested Component Viewport -->
    <main class="content-body">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Custom Logout Confirmation Modal -->
  <div class="modal-backdrop" *ngIf="isLogoutConfirmOpen()">
    <div class="modal-card modal-confirm">
      <div class="modal-header">
        <h2>Confirm Sign Out</h2>
        <button (click)="closeLogoutConfirm()" class="btn-close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to sign out of the system?</p>
      </div>
      <div class="modal-footer">
        <button type="button" (click)="closeLogoutConfirm()" class="btn-secondary">Cancel</button>
        <button type="button" (click)="executeLogout()" class="btn-danger">Sign Out</button>
      </div>
    </div>
  </div>
</div>
