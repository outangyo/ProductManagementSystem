<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">🔑</div>
      <h2>Welcome Back</h2>
      <p>Product & Category Management System</p>
    </div>

    <!-- Error message display -->
    <div class="alert alert-danger" *ngIf="errorMessage()">
      <span class="alert-icon">⚠️</span>
      <span class="alert-text">{{ errorMessage() }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="off">
      
      <!-- Username field -->
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper" [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            id="username" 
            formControlName="username" 
            placeholder="Enter your username..."
          />
        </div>
        <small class="error-text" *ngIf="loginForm.get('username')?.errors?.['required'] && loginForm.get('username')?.touched">
          Username is required.
        </small>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper" [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="Enter your password..."
          />
        </div>
        <small class="error-text" *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">
          Password is required.
        </small>
      </div>

      <!-- Submit button -->
      <button type="submit" class="btn-login" [disabled]="isLoading()">
        <span class="spinner" *ngIf="isLoading()"></span>
        <span class="btn-text">{{ isLoading() ? 'Signing in...' : 'Sign In' }}</span>
      </button>

    </form>
  </div>
</div>
