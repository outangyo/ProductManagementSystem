services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: product-management-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SqlPassword123!
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "SqlPassword123!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    image: product-management-api
    container_name: product-management-api
    build:
      context: .
      dockerfile: ProductManagementSystem.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=ProductManagementDb;User ID=sa;Password=SqlPassword123!;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=super_secret_key_that_must_be_very_long_at_least_32_bytes_long
      - Jwt__Issuer=ProductManagementSystemAPI
      - Jwt__Audience=ProductManagementSystemWeb
      - Jwt__ExpiryInMinutes=60
    ports:
      - "5040:8080"
    volumes:
      - uploads-data:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    image: product-management-web
    container_name: product-management-web
    build:
      context: ./ProductManagementSystem.Web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  db-data:
  uploads-data:
